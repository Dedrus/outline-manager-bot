version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: outline-telegram-bot
    restart: unless-stopped
    environment:
      # Telegram Bot Settings
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_IDS=${TELEGRAM_ADMIN_IDS}
      - DEFAULT_DATA_LIMIT_GB=${DEFAULT_DATA_LIMIT_GB:-100}
      
      # Outline API Settings
      - OUTLINE_API_URL=${OUTLINE_API_URL}
      - OUTLINE_CERT_SHA256=${OUTLINE_CERT_SHA256}
      
      # Database Settings
      - DATABASE_CONNECTION_STRING=Data Source=/app/data/vpn_bot.db
      
      # Key Update Service Settings
      - CHECK_INTERVAL_SECONDS=${CHECK_INTERVAL_SECONDS}
      - UPDATE_INTERVAL_DAYS=${UPDATE_INTERVAL_DAYS}
    
    volumes:
      - bot-data:/app/data
    
    ports:
      - "8080:8080"
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  bot-data:
    name: outline-bot-data
